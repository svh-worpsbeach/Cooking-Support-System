version: '3.8'

services:
  # DB2 Database Service
  db2:
    image: icr.io/db2_community/db2:latest
    container_name: cooking-db2
    privileged: true
    ports:
      - "5500:50000"
    environment:
      - LICENSE=accept
      - DB2INSTANCE=db2inst1
      - DB2INST1_PASSWORD=db2inst1-pwd
      - DBNAME=COOKDB
      - ARCHIVE_LOGS=false
      - AUTOCONFIG=false
    volumes:
      - db2-data:/database
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "su - db2inst1 -c 'db2 connect to COOKDB' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
    networks:
      - cooking-network

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cooking-backend
    ports:
      - "5580:8000"
    environment:
      - DATABASE_TYPE=db2
      - DB2_HOST=db2
      - DB2_PORT=50000
      - DB2_DATABASE=COOKDB
      - DB2_USER=db2inst1
      - DB2_PASSWORD=db2inst1-pwd
      - CORS_ORIGINS=http://localhost,http://localhost:80,http://frontend
      - POOL_SIZE=10
      - MAX_OVERFLOW=20
      - POOL_PRE_PING=true
      - ECHO_SQL=true
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      db2:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - cooking-network

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5580
    container_name: cooking-frontend
    ports:
      - "5501:80"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - cooking-network

networks:
  cooking-network:
    driver: bridge

volumes:
  db2-data:
    driver: local

