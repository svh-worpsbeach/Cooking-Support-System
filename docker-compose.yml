version: '3.8'

services:
  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cooking-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./cooking.db
      - CORS_ORIGINS=http://localhost,http://localhost:80,http://frontend
    volumes:
      - ./backend/cooking.db:/app/cooking.db
      - ./backend/uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/recipes"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - cooking-network

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
    container_name: cooking-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - cooking-network

networks:
  cooking-network:
    driver: bridge

volumes:
  backend-data:
    driver: local

