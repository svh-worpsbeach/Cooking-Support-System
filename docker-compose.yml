version: '3.8'

# PostgreSQL Docker Compose Configuration
# Use this configuration for PostgreSQL as the database backend

services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:16-alpine
    container_name: cooking-postgres
    hostname: postgres
    ports:
      - "5532:5432"
    environment:
      - POSTGRES_DB=cooking_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/postgres-init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cooking-network

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cooking-backend
    hostname: backend
    ports:
      - "5580:8000"
    environment:
      - DATABASE_TYPE=postgresql
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DATABASE=cooking_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - CORS_ORIGINS=http://frontend,http://localhost:5500,http://localhost:5580
      - POOL_SIZE=10
      - MAX_OVERFLOW=20
      - POOL_PRE_PING=true
      - ECHO_SQL=true
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - cooking-network

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://192.168.178.88:5580
    container_name: cooking-frontend
    hostname: frontend
    ports:
      - "5500:80"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - cooking-network

networks:
  cooking-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local

