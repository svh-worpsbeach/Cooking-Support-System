version: '3.8'

services:
  # DB2 Database Service
  db2:
    image: icr.io/db2_community/db2:latest
    container_name: cooking-db2
    privileged: true
    ports:
      - "50000:50000"
    environment:
      - LICENSE=accept
      - DB2INSTANCE=db2inst1
      - DB2INST1_PASSWORD=db2inst1-pwd
      - DBNAME=cookingdb
      - ARCHIVE_LOGS=false
      - AUTOCONFIG=false
    volumes:
      - db2-data:/database
      - ./backend/db2-init:/var/custom
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "su", "-", "db2inst1", "-c", "db2 connect to cookingdb"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - cooking-network

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cooking-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=db2+ibm_db://db2inst1:db2inst1-pwd@db2:50000/cookingdb
      - CORS_ORIGINS=http://localhost,http://localhost:80,http://frontend
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      db2:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/recipes"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - cooking-network

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
    container_name: cooking-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - cooking-network

networks:
  cooking-network:
    driver: bridge

volumes:
  db2-data:
    driver: local

